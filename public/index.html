<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Marketplace</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="auto-theme">
  <div id="app">
    <header>
      <img src="assets/logo.svg" alt="Logo" class="logo neon-logo icon-8d" id="logo">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Поиск товаров...">
        <button id="searchBtn">🔍</button>
      </div>
      <button id="categoriesBtn" class="neon-button">Категории</button>
    </header>
    
    <div id="categoriesModal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h3>Категории</h3>
        <ul id="categoriesList">
          <li data-category="all">Все</li>
          <li data-category="electronics">Электроника</li>
          <li data-category="clothing">Одежда</li>
          <li data-category="games">Игры</li>
          <li data-category="other">Другое</li>
        </ul>
      </div>
    </div>

    <main id="product-list">
      <!-- Товары загружаются через JS -->
    </main>

    <nav class="bottom-nav">
      <a href="/" class="nav-item active">🏠 Главная</a>
      <a href="/profile.html" class="nav-item">👤 Профиль</a>
      <a href="/admin.html" class="nav-item">⚙️ Админ</a>
    </nav>
  </div>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
